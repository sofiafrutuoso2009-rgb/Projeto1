<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Lista de Alunos</title>

<style>
body {
  font-family: Arial, sans-serif;
  max-width: 500px;
  margin: 40px auto;
}

h2 {
  text-align: center;
}

.input-group {
  display: flex;
  gap: 10px;
}

input {
  flex: 1;
  padding: 10px;
  font-size: 16px;
}

button {
  padding: 10px 15px;
  cursor: pointer;
}

ul {
  list-style: none;
  padding: 0;
  margin-top: 20px;
}

li {
  padding: 10px;
}

li:nth-child(even) {
  background: #f2f2f2;
}

li:nth-child(odd) {
  background: #ffffff;
}
</style>
</head>
<body>

<h2>Cadastro de Alunos</h2>

<div class="input-group">
  <input type="text" id="nome" placeholder="Nome do aluno">
  <button onclick="enviar()">Adicionar</button>
</div>

<ul id="lista"></ul>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxXFXC7Qbk-rW6NZJrNDzMhWVXaNfXl5K59TdOz5_gCYuX_8N9umH6CGeqqZF0ptZGK/exec";

async function enviar() {
  const input = document.getElementById("nome");
  const nome = input.value.trim();

  if (!nome) return;

  await fetch(API_URL + "?nome=" + encodeURIComponent(nome));
  input.value = "";
  carregar();
}

async function carregar() {
  const res = await fetch(API_URL);
  const data = await res.json();

  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  data.alunos.forEach(nome => {
    const li = document.createElement("li");
    li.textContent = nome;
    lista.appendChild(li);
  });
}

// carregar ao abrir
carregar();
</script>

</body>
</html>
